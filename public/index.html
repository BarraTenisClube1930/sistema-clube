<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#EEF2F7;min-height:100vh}
:root{--navy:#1B3A70;--navy2:#162e5c;--lblue:#C8DCF0;--white:#fff;--gray:#6b7280;--border:#e2e8f0}

.hdr{background:var(--navy);color:var(--white);padding:12px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.hdr-title{font-weight:700;font-size:17px;letter-spacing:.5px}
.hdr-sub{font-size:11px;opacity:.75;letter-spacing:.5px}
.hdr-right{margin-left:auto;text-align:right;font-size:11px;opacity:.85;line-height:1.6}

.sync-status{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;margin-left:12px}
.sync-status.online{background:#d1fae5;color:#065f46}
.sync-status.offline{background:#fee2e2;color:#991b1b}
.sync-status.syncing{background:#fef3c7;color:#92400e}
.sync-dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite}
.sync-dot.online{background:#10b981}
.sync-dot.offline{background:#ef4444}
.sync-dot.syncing{background:#f59e0b}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.tabs{background:var(--navy2);display:flex;padding:0 12px;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{background:transparent;color:rgba(255,255,255,.7);border:none;padding:10px 13px;cursor:pointer;font-weight:600;font-size:12px;border-radius:6px 6px 0 0;transition:all .15s;margin-top:4px;white-space:nowrap;flex-shrink:0}
.tab-btn.active{background:var(--white);color:var(--navy)}

.content{max-width:860px;margin:0 auto;padding:22px 16px}
h2{color:var(--navy);font-size:18px;margin-bottom:16px}

.section{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:18px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.section-title{color:var(--navy);font-size:14px;font-weight:700;padding-bottom:8px;margin-bottom:14px;border-bottom:2px solid var(--lblue)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col2{grid-column:1/-1}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;outline:none;font-family:inherit;background:white}
.field textarea{resize:vertical}
.field input:focus,.field select:focus{border-color:var(--navy);box-shadow:0 0 0 2px rgba(27,58,112,.15)}
.hint{font-size:11px;color:var(--gray);margin-top:2px}
.req{color:red}

.alert{padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px;font-weight:500;animation:slideDown 0.3s ease}
.alert.ok{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.alert.err{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.alert.warn{background:#fffbeb;color:#92400e;border:1px solid #fbbf24}
.info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:8px 14px;font-size:12px;color:#1e40af;margin-bottom:14px}
.info-box.green{background:#f0fdf4;border-color:#86efac;color:#166534}
.info-box.yellow{background:#fffbeb;border-color:#fbbf24;color:#92400e}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

.btn-primary{background:var(--navy);color:var(--white);border:none;padding:11px 26px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.2);transition:opacity .15s}
.btn-primary:hover{opacity:.9}
.btn-outline{background:var(--white);color:var(--navy);border:2px solid var(--navy);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn-sm{background:var(--navy);color:var(--white);border:none;padding:5px 11px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;margin-right:4px}
.btn-del{background:#dc2626;color:white;border:none;padding:5px 11px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}
.btn-del:hover{background:#b91c1c}
.btn-print{background:var(--navy);color:var(--white);border:none;padding:9px 20px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700}
.btn-green{background:#059669;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn-green:hover{background:#047857}

.photo-box{width:90px;height:115px;border:2px dashed var(--navy);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;background:#f8fafc;font-size:11px;color:#9ca3af;text-align:center;padding:6px;flex-shrink:0}
.photo-box img{width:100%;height:100%;object-fit:cover}

.dep-card{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.dep-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}

.member-row{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.avatar{width:46px;height:58px;background:var(--lblue);border-radius:4px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;color:var(--navy)}
.avatar img{width:100%;height:100%;object-fit:cover}
.member-name{font-weight:700;color:var(--navy);font-size:14px}
.member-sub{font-size:12px;color:var(--gray);margin-top:2px}
.member-tags{font-size:11px;color:#9ca3af;margin-top:3px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}

/* TAGS */
.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.3px}
.tag-prop{background:#1B3A70;color:white}
.tag-cont{background:#0891b2;color:white}
.tag-isento{background:#fef3c7;color:#92400e}
.tag-dep{background:#e0e7ff;color:#3730a3}
.tag-ativo{background:#d1fae5;color:#065f46}
.tag-suspenso{background:#fef3c7;color:#92400e}
.tag-inadimplente{background:#fee2e2;color:#991b1b}
.tag-desligado{background:#e5e7eb;color:#374151}

.search-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:16px;outline:none}
.search-input:focus{border-color:var(--navy)}
.empty{text-align:center;padding:40px;color:#9ca3af;font-size:14px}
.cep-loading{font-size:11px;color:#7c3aed;margin-top:2px;font-weight:600}

/* CARTEIRINHA */
.card-wrap{display:flex;flex-wrap:wrap;gap:14px;padding:16px;background:#f1f5f9;border-radius:8px;border:1px solid var(--border)}
.btc-card{width:290px;height:188px;border:2.5px solid #1B3A70;border-radius:4px;background:#fff;position:relative;flex-shrink:0;font-family:Arial,Helvetica,sans-serif;overflow:hidden}
.btc-top{background:#C8DCF0;position:relative;border-bottom:2px solid #1B3A70;display:flex;flex-direction:column;overflow:visible}
/* Zona 1: cabeçalho com info do clube + foto lado a lado */
.btc-header-zone{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 7px 4px 7px;position:relative;z-index:4}
.btc-club-block{flex:1}
.btc-club-name{color:#1B3A70;font-weight:bold;font-size:8px;margin-top:3px;line-height:1.3}
.btc-club-info{color:#1B3A70;font-size:6.5px;line-height:1.55}
.btc-photo{width:63px;height:90px;border:1.5px solid #1B3A70;background:#e5e7eb;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:9px;color:#888;font-weight:bold;text-align:center}
.btc-photo img{width:100%;height:100%;object-fit:cover}
/* Zona 2: faixa diagonal — fica ENTRE o cabeçalho e a área inferior */
.btc-stripe-zone{position:relative;height:18px;overflow:hidden;margin:0}
.btc-stripe{position:absolute;left:-20px;right:-20px;top:4px;background:#1B3A70;padding:3px 0;transform:rotate(-3deg);color:#fff;font-size:6.5px;font-weight:bold;letter-spacing:1.5px;text-align:center;z-index:3;width:120%}
.btc-body{padding:5px 8px 18px 8px;font-size:9px;color:#111;line-height:1.8}
.btc-footer{position:absolute;bottom:0;left:0;right:0;border-top:1.5px solid #1B3A70;background:#fff;text-align:center;padding:3px;color:#1B3A70;font-weight:bold;font-size:7px;letter-spacing:.8px}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:16px}
.kpi-card{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:16px 12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.kpi-num{font-size:30px;font-weight:800;color:var(--navy);line-height:1}
.kpi-label{font-size:11px;color:var(--gray);margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.kpi-icon{font-size:20px;margin-bottom:4px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.bar-lbl{width:170px;font-size:12px;color:#374151;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-bg{flex:1;height:22px;background:#f1f5f9;border-radius:4px;overflow:hidden;min-width:60px}
.bar-fill{height:100%;background:var(--navy);border-radius:4px;transition:width .6s ease;display:flex;align-items:center;padding-left:8px;min-width:28px}
.bar-val{font-size:11px;color:white;font-weight:700}
.bar-pct{font-size:11px;color:#6b7280;font-weight:700;margin-left:6px}

/* TÍTULOS TAB */
.titulo-row{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.titulo-num{background:var(--navy);color:white;border-radius:6px;padding:4px 10px;font-weight:800;font-size:14px;min-width:60px;text-align:center;flex-shrink:0}
.transfer-row{background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:10px 14px;margin-bottom:6px;font-size:12px}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:white;border-radius:12px;padding:24px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:16px}

/* FICHA */
.ficha-header{display:flex;gap:16px;align-items:flex-start;margin-bottom:16px}
.ficha-photo{width:100px;height:130px;border:2px solid var(--navy);border-radius:6px;overflow:hidden;flex-shrink:0;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:bold;color:var(--navy)}
.ficha-photo img{width:100%;height:100%;object-fit:cover}
.ficha-name{font-size:20px;font-weight:700;color:var(--navy)}
.ficha-mat{font-size:13px;color:var(--gray);margin-top:2px}
.ficha-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.ficha-field{margin-bottom:12px}
.ficha-field .lbl{font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.5px}
.ficha-field .val{font-size:14px;color:#111;margin-top:2px}
.ficha-field .val a{color:var(--navy);text-decoration:underline;word-break:break-all}
.ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 20px}
.btn-edit{background:#059669;color:white;border:none;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn-edit:hover{background:#047857}
.btn-back{background:var(--white);color:var(--navy);border:2px solid var(--navy);padding:7px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn-link{background:#2563eb;color:white;border:none;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;text-decoration:none;display:inline-block}
.btn-link:hover{background:#1d4ed8}

/* LOGIN */
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#EEF2F7;z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--white);border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.15);padding:36px 32px;width:340px;text-align:center}
.login-box .logo-area{margin-bottom:20px}
.login-box h2{color:var(--navy);font-size:18px;margin-bottom:4px}
.login-box .subtitle{color:var(--gray);font-size:12px;margin-bottom:22px}
.login-box .field{text-align:left;margin-bottom:14px}
.login-box .field label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px}
.login-box .field input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none}
.login-box .field input:focus{border-color:var(--navy);box-shadow:0 0 0 2px rgba(27,58,112,.15)}
.login-box .btn-login{width:100%;background:var(--navy);color:var(--white);border:none;padding:12px;border-radius:8px;cursor:pointer;font-size:15px;font-weight:700;margin-top:6px;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.login-box .btn-login:hover{opacity:.9}
.login-box .login-err{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;padding:8px 12px;border-radius:6px;font-size:12px;margin-top:12px;display:none}
.login-box .login-register{margin-top:16px;font-size:12px;color:var(--gray)}
.login-box .login-register a{color:var(--navy);font-weight:600;cursor:pointer;text-decoration:underline}
.register-fields{display:none}
.btn-logout{background:transparent;border:1px solid rgba(255,255,255,.4);color:rgba(255,255,255,.9);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;margin-top:4px}
.btn-logout:hover{background:rgba(255,255,255,.15)}
.user-info{font-size:11px;opacity:.85}

@media print{
  body>*{display:none!important}
  #print-area{display:block!important;position:fixed;top:0;left:0;right:0;bottom:0}
  .btc-card{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .card-wrap{display:flex;flex-wrap:wrap;gap:8px;background:white;border:none;padding:8px}
}
#print-area{display:none}
</style>
</head>
